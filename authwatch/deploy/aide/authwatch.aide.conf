# authwatch AIDE configuration — covers the Linux trust path named in DESIGN.md:
# /etc, the PAM module dirs, /usr/bin, /usr/sbin, /root/.ssh.
#
# Initialize the database at known-good state, then copy it to OFF-HOST/read-only
# media — that database is the trust anchor (see deploy/README.md):
#   sudo aide --config=/etc/authwatch/authwatch.aide.conf --init
#   sudo cp /var/lib/aide/aide.db.new.gz /mnt/trust-anchor/aide.db.gz
# `authwatch check --aide` then runs `aide --check` against database_in below.

database_in  = file:/mnt/trust-anchor/aide.db.gz
database_out = file:/var/lib/aide/aide.db.new.gz
gzip_dbout   = yes
report_url   = stdout

# Content (sha256/sha512) plus key ownership/permission metadata. mtime/ctime are
# deliberately omitted so routine directory touches don't drown the real signal.
Trust = p+u+g+i+n+s+sha256+sha512

# --- the trust path ---
/etc                                 Trust
/lib/security                        Trust
/lib64/security                      Trust
/usr/lib/security                    Trust
/usr/lib64/security                  Trust
/usr/lib/x86_64-linux-gnu/security   Trust
/usr/bin                             Trust
/usr/sbin                            Trust
/root/.ssh                           Trust

# --- /etc paths that legitimately churn (tune to taste) ---
!/etc/mtab$
!/etc/adjtime$
!/etc/resolv\.conf$
!/etc/.*\.cache$

name: release

# Tag-triggered release: build static Linux amd64 + arm64 binaries for all 8 Go
# modules, build the Tauri console AppImage (amd64 only), assemble per-arch
# tarballs with SHA256SUMS, and publish a GitHub Release.
#
# workflow_dispatch runs the SAME builds as a DRY-RUN: it uploads the artifacts
# via actions/upload-artifact and publishes NO release — so the pipeline can be
# verified end-to-end without cutting a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write   # needed by `gh release create` on the tag path

env:
  # On a tag push, GITHUB_REF_NAME is the tag (e.g. v1.2.3). On workflow_dispatch
  # it is the branch name; we still inject it as the version for the dry-run.
  VERSION: ${{ github.ref_name }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Per-arch static Go binaries (amd64 + arm64). Pure-Go, stdlib-only, so
  #    cross-compiling arm64 needs NO C cross-toolchain — just GOARCH=arm64.
  # ---------------------------------------------------------------------------
  binaries:
    name: go binaries · ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Build all 8 modules (static, version-injected)
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          mkdir -p out/bin
          ldflags="-s -w -X main.version=${VERSION}"
          # module:binary:build_pkg  (bpfsentry builds from ./cmd/bpfsentry,
          # agent's binary is agentd; the rest build their root package).
          mods="
            authwatch:authwatch:.
            credsentinel:credsentinel:.
            instguard:instguard:.
            posturescan:posturescan:.
            egresswatch:egresswatch:.
            bpfsentry:bpfsentry:./cmd/bpfsentry
            collector:collector:.
            agent:agentd:.
          "
          for spec in $mods; do
            mod="${spec%%:*}"; rest="${spec#*:}"; bin="${rest%%:*}"; pkg="${rest#*:}"
            echo ">> $mod -> $bin ($GOOS/$GOARCH)"
            ( cd "$mod" && go build -trimpath -ldflags "$ldflags" \
                -o "${GITHUB_WORKSPACE}/out/bin/$bin" "$pkg" )
          done
          echo "--- built binaries ---"
          ls -l out/bin
          # Prove the version was injected (binaries are this runner's arch on
          # amd64; on arm64 they won't run here, so only smoke-test the native one).
          if [ "$GOARCH" = "amd64" ]; then
            ./out/bin/collector version
          fi

      - name: Upload binaries for the assemble job
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goarch }}
          path: out/bin/*
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Tauri console AppImage (amd64 only — Tauri bundles the host arch and the
  #    runner is amd64). WebKitGTK deps + tauri-cli, then `cargo tauri build`.
  # ---------------------------------------------------------------------------
  appimage:
    name: tauri console AppImage · amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: WebKitGTK + GTK dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev build-essential file

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: console/src-tauri

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      # Build the AppImage. The updater signature + latest.json are produced ONLY
      # when the operator has supplied the signing key as a secret (mapped to env
      # below). The gate is a shell `[ -n "$TAURI_SIGNING_PRIVATE_KEY" ]` test —
      # NOT a job-level secret `if` — so forks / the workflow_dispatch dry-run
      # (no secret) fall through to the EXISTING unsigned build path and stay green.
      - name: Build the AppImage (signed updater artifacts when the key is present)
        working-directory: console
        env:
          # Secrets → env. Absent on forks / dry-run → empty string → unsigned path.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # The bundled app version MUST equal the release tag — otherwise the updater
          # forever compares latest.json (the tag) against tauri.conf's hard-coded
          # version and re-notifies on every launch, even after installing. On a TAG
          # push, derive bare SemVer from the tag (strip leading "v") and inject it via
          # --config; FAIL fast if the tag is not strict SemVer (an unparseable
          # manifest version would silently disable updates). On the workflow_dispatch
          # dry-run the ref is a BRANCH, not a release, so use a dev version + no guard
          # (keeps the dry-run green; dispatch never publishes a release).
          if [ "$EVENT_NAME" = "push" ]; then
            appver="${VERSION#v}"
            if ! printf '%s' "$appver" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?(\+[0-9A-Za-z.]+)?$'; then
              echo "::error::release tag '${VERSION}' is not strict SemVer (need MAJOR.MINOR.PATCH); the updater manifest would be unparseable"; exit 1
            fi
          else
            appver="0.0.0-dev"
          fi
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo ">> signing key present → building v${appver} with createUpdaterArtifacts (produces .AppImage.sig)"
            cargo tauri build --bundles appimage \
              --config "{\"version\":\"${appver}\",\"bundle\":{\"createUpdaterArtifacts\":true}}"
          else
            echo ">> no signing key → unsigned AppImage v${appver} only (no updater artifacts)"
            cargo tauri build --bundles appimage \
              --config "{\"version\":\"${appver}\"}"
          fi

      - name: Collect the AppImage (+ updater .sig when signed)
        run: |
          set -euo pipefail
          mkdir -p out
          # Tauri writes the bundle under src-tauri/target/release/bundle/appimage/.
          found="$(find console/src-tauri/target -path '*bundle/appimage/*.AppImage' -print -quit || true)"
          if [ -z "$found" ]; then
            echo "::error::no AppImage produced"; find console/src-tauri/target -name '*.AppImage' || true; exit 1
          fi
          appimage_name="defensive-suite-console-${VERSION}-amd64.AppImage"
          cp "$found" "out/${appimage_name}"
          # When signing was on, Tauri emits "<bundle>.sig" next to the AppImage.
          # Carry it forward under the SAME basename as the release asset so the
          # assemble job can read its contents into latest.json.
          if [ -f "${found}.sig" ]; then
            cp "${found}.sig" "out/${appimage_name}.sig"
            echo ">> updater signature collected: out/${appimage_name}.sig"
          else
            echo ">> no .sig produced (unsigned build) — updater artifacts skipped"
          fi
          ls -l out

      - name: Upload the AppImage (+ .sig if present)
        uses: actions/upload-artifact@v4
        with:
          name: appimage-amd64
          # Globs both the AppImage and the optional .sig.
          path: out/defensive-suite-console-*
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. Assemble per-arch tarballs (binaries + deploy/ trees + install.sh +
  #    dashboard + READMEs) with SHA256SUMS, and either publish a Release
  #    (tag push) or upload the artifacts as a dry-run (workflow_dispatch).
  # ---------------------------------------------------------------------------
  assemble:
    name: assemble + release
    needs: [binaries, appimage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Assemble per-arch tarballs + SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p dist
          modules="authwatch credsentinel instguard posturescan egresswatch bpfsentry collector agent"
          for arch in amd64 arm64; do
            stage="defensive-suite-${VERSION}-linux-${arch}"
            rm -rf "$stage"; mkdir -p "$stage/bin"
            # Binaries go in bin/ at the tarball ROOT, next to install.sh. The
            # shipped install.sh detects $SCRIPT_DIR/bin and installs these
            # prebuilt binaries WITHOUT a Go toolchain (see resolve_source()).
            cp dl/binaries-${arch}/* "$stage/bin/"
            chmod +x "$stage/bin/"*
            # Each module's deploy/ tree (systemd units, config examples, sigma…)
            for m in $modules; do
              if [ -d "$m/deploy" ]; then
                mkdir -p "$stage/$m"
                cp -R "$m/deploy" "$stage/$m/"
              fi
            done
            # Installer + dashboard + top-level docs
            cp install.sh "$stage/"
            chmod +x "$stage/install.sh"
            cp -R dashboard "$stage/"
            cp README.md "$stage/" 2>/dev/null || true
            [ -d docs ] && cp -R docs "$stage/" || true
            # Tar it up
            tar -czf "dist/${stage}.tar.gz" "$stage"
            rm -rf "$stage"
          done
          # Include the amd64 AppImage (and its updater .sig, if the signed build
          # produced one) as top-level release assets.
          cp dl/appimage-amd64/*.AppImage dist/ 2>/dev/null || true
          cp dl/appimage-amd64/*.AppImage.sig dist/ 2>/dev/null || true
          # One SHA256SUMS over everything in dist/ (latest.json is generated
          # AFTER this and is the updater manifest, not a checksummed asset).
          ( cd dist && sha256sum * > SHA256SUMS )
          echo "--- release artifacts ---"
          ls -l dist
          cat dist/SHA256SUMS

      # Generate the updater manifest ONLY when the signed build produced a .sig.
      # latest.json is the static manifest the console's updater polls (see the
      # endpoint in tauri.conf). The url points at the GitHub release download of
      # the signed AppImage; the signature is the verbatim contents of its .sig.
      # No .sig (dry-run / forks / signing not enabled) → no latest.json, build
      # stays green and the release carries no updater manifest.
      - name: Generate updater latest.json (only when a signature is present)
        run: |
          set -euo pipefail
          sig_file="$(find dl/appimage-amd64 -name '*.AppImage.sig' -print -quit || true)"
          if [ -z "$sig_file" ]; then
            echo ">> no .AppImage.sig — updater not enabled this run; skipping latest.json"
            exit 0
          fi
          appimage_name="defensive-suite-console-${VERSION}-amd64.AppImage"
          signature="$(cat "$sig_file")"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          download_url="https://github.com/mtclinton/defensive-suite/releases/download/${VERSION}/${appimage_name}"
          # Tauri's static-manifest schema: {version, notes, pub_date, platforms{...}}.
          # version is BARE SemVer (strip the leading "v") so it equals the bundled
          # app version the build injected — the updater compares them as SemVer, so a
          # mismatch (or a v-prefix) would re-notify forever. The asset filename/url
          # keep the literal tag.
          jq -n \
            --arg version "${VERSION#v}" \
            --arg notes "defensive-suite console ${VERSION}" \
            --arg pub_date "${pub_date}" \
            --arg signature "${signature}" \
            --arg url "${download_url}" \
            '{
               version: $version,
               notes: $notes,
               pub_date: $pub_date,
               platforms: {
                 "linux-x86_64": { signature: $signature, url: $url }
               }
             }' > dist/latest.json
          echo "--- latest.json ---"
          cat dist/latest.json

      # --- TAG PUSH: publish a GitHub Release with all artifacts ---------------
      # latest.json + the .AppImage.sig are included ONLY when the signed build
      # produced them (updater enabled); otherwise the release ships the same
      # unsigned assets as before. The latest.json asset must keep that exact
      # filename so the console's `releases/latest/download/latest.json` endpoint
      # resolves on the newest release.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(dist/*.tar.gz dist/*.AppImage dist/SHA256SUMS)
          [ -f dist/latest.json ] && assets+=(dist/latest.json)
          for s in dist/*.AppImage.sig; do [ -e "$s" ] && assets+=("$s"); done
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            "${assets[@]}"

      # --- workflow_dispatch DRY-RUN: upload artifacts, publish NOTHING --------
      - name: Upload release artifacts (dry-run, no Release published)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-dryrun-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

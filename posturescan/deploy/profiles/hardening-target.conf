# posturescan — target sysctl hardening profile (DATA, not installed)
#
# This is the goal state posturescan diffs the host against. It mirrors the
# built-in GoalProfile; edit it and pass `posturescan scan --profile <this>` to
# override the targets without changing code. Each key is "key = value".
#
# A profile sets only the recommended Want value; it does NOT narrow the set of
# accepted values. The built-in allowed values still apply, so a host that is at
# an also-accepted or stricter value than the target (e.g. ptrace_scope=3 when
# the target is 2, or unprivileged_bpf_disabled=1 when the target is 2) is still
# reported OK — never flagged as drift.
#
# Goal state (DESIGN.md): unprivileged_bpf_disabled=2, ptrace_scope=2,
# lockdown=confidentiality, module signing enforced, no stray CAP_BPF.
#
# NOTE: kernel.lockdown and module.sig_enforce are NOT runtime sysctls — they
# are boot-time settings. posturescan reads and scores them but its remediate
# drop-in cannot set them; it emits a kernel-cmdline note instead. They are
# listed here only to document the target.

# bpf() attack surface — the eBPF-rootkit primitive. 1 disables unprivileged
# bpf(); 2 also locks the toggle. Want 2 (1 is also accepted).
kernel.unprivileged_bpf_disabled = 2

# ptrace scope — THIS is the ssh-keysign-pwn race fix. 2 = admin-only ptrace.
# Want 2; the stricter 3 (no ptrace at all) is also accepted.
kernel.yama.ptrace_scope = 2

# Hide kernel pointers from unprivileged readers (exploit/KASLR aid).
# Want 2; 1 is also accepted.
kernel.kptr_restrict = 2

# Restrict dmesg to privileged users (leaks kernel addresses/state).
kernel.dmesg_restrict = 1

# Block further module loads once set (optional; breaks late module loading).
kernel.modules_disabled = 1

# --- boot-time only (documented target; remediate emits a cmdline note) ---
# kernel.lockdown = confidentiality      # kernel cmdline: lockdown=confidentiality
# module.sig_enforce = 1                 # kernel cmdline: module.sig_enforce=1

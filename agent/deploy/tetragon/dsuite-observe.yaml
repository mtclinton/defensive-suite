# defensive-suite — Tetragon TracingPolicy (OBSERVE mode, M1).
#
# Surfaces the events agentd's rules consume: eBPF program loads and writes to
# the trust-path files. process_exec/exit are emitted by Tetragon by default, so
# the staging-dir / fileless-exec rules need no policy here.
#
# This policy ONLY observes (no matchActions) — every match is reported, nothing
# is blocked. Enforcement (M4) is a one-line change: add
#   matchActions: [{ action: Sigkill }]   (or Override)
# to a selector, and validate it in a VM first. Override additionally requires a
# kernel built with CONFIG_BPF_KPROBE_OVERRIDE (check with `tetra probe`).
#
# Install (privileged — review first; do not auto-run):
#   sudo tetra tracingpolicy add dsuite-observe.yaml
#   # or, declaratively, drop it where your Tetragon daemon loads policies from.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: dsuite-observe
spec:
  kprobes:
    # eBPF program load — the rootkit-load signal.
    - call: "bpf_check"  # portable BPF-load hook (see note): security_bpf_prog_load only exists on >=6.10; bpf_check (the verifier, fired on every prog load) is present on all supported kernels and is in agentd BPFLoadFuncs
      syscall: false
      # no selectors/actions → every load is reported (agentd allowlists loaders).

    # -------------------------------------------------------------------------
    # Outbound TCP connect — the EGRESS signal that feeds agentd's correlation
    # layer. On its own a connect is low-value noise; agentd's stateful
    # correlator PAIRS it (by exec_id) with a recent suspicious exec — a
    # staging-dir / fileless exec or an unrecognized eBPF load by the SAME
    # process — and escalates the pair to a Critical "suspicious process then
    # connected out" C2 finding (T1071), with the process lineage attached.
    #
    # We hook `tcp_connect`, the standard Tetragon egress function. It fires once
    # per outbound TCP connection attempt with the socket as its first argument.
    # Declaring arg index 0 as type "sock" makes Tetragon EXPORT the socket — the
    # destination address/port land in the event's sock_arg (daddr / dport), which
    # the parser normalizes into a "connect" Event's Dst / DstPort.
    #
    # OBSERVE ONLY — there are NO selectors and NO matchActions here, so EVERY
    # outbound connection is merely reported, never blocked. Egress enforcement is
    # explicitly out of scope (deferred): correlation runs in the agent on the
    # reported stream; the kernel hook only observes.
    #
    # (If your kernel/Tetragon build prefers the LSM hook, `security_socket_connect`
    #  is an equivalent egress function the parser also recognizes — but the sock
    #  argument export differs by hook, so prefer tcp_connect where available.)
    # -------------------------------------------------------------------------
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
      # no selectors/matchActions → OBSERVE only (every egress connect reported).

    # Writes to trust-path files (ld.so.preload / PAM / authorized_keys / sshd_config).
    #
    # security_file_permission(file, mask) fires on read+write+exec. We declare
    # arg index 1 (the access mask) and AND a Mask selector value "2" (MAY_WRITE)
    # with the path match, so Tetragon emits ONLY writes — sshd reading
    # sshd_config, an authorized_keys read on login, and PAM reading a module no
    # longer surface as events. (agentd also mask-gates defensively.)
    #
    # Per-user SSH keys are caught with a Postfix on "/.ssh/authorized_keys"
    # (and "authorized_keys2") so /home/<user> keys are surfaced, not only /root.
    - call: "security_file_permission"
      syscall: false
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/ld.so.preload"
                - "/etc/pam.d/"
                - "/root/.ssh/"
                - "/lib/security/"
                - "/lib64/security/"
                - "/usr/lib64/security/"
                - "/etc/ssh/sshd_config"
                - "/etc/ssh/sshd_config.d/"
                - "/etc/sudoers"
                - "/etc/sudoers.d/"
                - "/etc/ld.so.conf.d/"
                # persistence (agentd rates these High, not Critical — package
                # managers write some too). We watch the admin/attacker-primary
                # /etc locations and skip package-owned dirs (/usr/lib/systemd …).
                - "/etc/systemd/system/"
                - "/etc/systemd/user/"
                - "/etc/crontab"
                - "/etc/cron.d/"
                - "/etc/cron.hourly/"
                - "/etc/cron.daily/"
                - "/etc/cron.weekly/"
                - "/etc/cron.monthly/"
                - "/var/spool/cron/"
                - "/etc/profile"
                - "/etc/profile.d/"
                - "/etc/bash.bashrc"
                - "/etc/rc.local"
                - "/etc/init.d/"
                - "/etc/udev/rules.d/"
                - "/etc/modules-load.d/"
                - "/etc/modprobe.d/"
                - "/etc/modules"
                - "/etc/xdg/autostart/"
            - index: 1
              operator: "Mask"
              values:
                - "2" # MAY_WRITE — drop read/exec accesses
          # no matchActions → OBSERVE only.
        - matchArgs:
            - index: 0
              operator: "Postfix"
              values:
                - "/.ssh/authorized_keys"
                - "/.ssh/authorized_keys2"
                # per-user shell init (T1546.004)
                - "/.bashrc"
                - "/.bash_profile"
                - "/.bash_login"
                - "/.profile"
                - "/.zshrc"
                - "/.zshenv"
                - "/.zprofile"
            - index: 1
              operator: "Mask"
              values:
                - "2" # MAY_WRITE
          # no matchActions → OBSERVE only.

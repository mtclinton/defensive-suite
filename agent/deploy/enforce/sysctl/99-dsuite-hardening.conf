# =============================================================================
# defensive-suite — kernel hardening sysctl drop-in (M4 prevention baseline)
#
#   >>> SHIPPED, NOT APPLIED. REVIEW EVERY LINE. VALIDATE IN A VM FIRST. <<<
#   The build/tests never write any sysctl. Installing this file ARMS the
#   hardening. agentd preflight is READ-ONLY and does not apply it.
# =============================================================================
#
# Install (privileged — REVIEW, do not auto-run):
#     sudo install -m 0644 99-dsuite-hardening.conf /etc/sysctl.d/99-dsuite-hardening.conf
#     sudo sysctl --system        # apply (review the diff first: sysctl -a | grep …)
# Rollback:
#     sudo rm /etc/sysctl.d/99-dsuite-hardening.conf && sudo sysctl --system
#
# Each setting below is annotated with WHAT it hardens and WHO it might break, so
# you can decide per-line before arming. Comment out anything that conflicts with
# your workload (e.g. unprivileged_bpf_disabled if you run unprivileged-BPF tools).

# --- Kernel-pointer / log leakage (hinders implant reconnaissance) ----------

# Hide kernel pointers in /proc and other interfaces from ALL users (incl. root
# via tools), so an exploit can't trivially read kernel addresses to defeat KASLR.
kernel.kptr_restrict = 2

# Restrict dmesg to privileged users — keeps kernel log (addresses, secrets,
# attack traces) out of unprivileged hands.
kernel.dmesg_restrict = 1

# --- eBPF / kernel-code loading (the suite's core threat: kernel implants) --

# Disable unprivileged eBPF entirely. Shrinks the eBPF attack surface to root
# only; complements the Tetragon SIGKILL-on-bpf-load enforce policy.
# NOTE: breaks tools that rely on unprivileged BPF (rare on a workstation). If
# you need them, leave this off and rely on the Tetragon allow-list instead.
kernel.unprivileged_bpf_disabled = 1

# Forbid loading a new kernel via kexec — removes a path to boot an attacker
# kernel without a normal reboot (a persistence/anti-forensics technique).
kernel.kexec_load_disabled = 1

# --- ptrace (process injection / credential theft) --------------------------

# Yama: a process may ptrace only its own descendants (not arbitrary siblings).
# Blocks the classic "attach to another process and steal secrets / inject code"
# move. scope=1 is the standard hardened-desktop value; debuggers still work on
# their own children (and via sudo).
kernel.yama.ptrace_scope = 1

# --- Network anti-spoof / reconnaissance (relevant on a workstation) --------

# Reverse-path filtering (strict): drop packets whose source address isn't
# routable back out the receiving interface — basic anti-IP-spoofing.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Don't accept ICMP redirects — an attacker on-link can't reroute your traffic.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't send ICMP redirects (this host isn't a router on the daily driver).
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Don't accept source-routed packets — a spoofing/bypass primitive.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Log packets with impossible (martian) source addresses — cheap recon signal.
net.ipv4.conf.all.log_martians = 1

# Ignore ICMP echo broadcasts (don't be a smurf-amplifier).
net.ipv4.icmp_echo_ignore_broadcasts = 1
